services:
  - type: web
    name: sh-auth-service
    runtime: docker
    dockerfilePath: ./backend/auth_service/Dockerfile
    dockerContext: ./backend/auth_service
    plan: free
    envVars:
      - key: PORT
        value: "3001"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: studyhub_auth_db
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
  
